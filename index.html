    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>surprise</title>

    <style>

        .title{
            text-align:center;
            font-size:50px;
            color:crimson;
            margin-top:20px;
            animation:zoom 2s infinite alternate;
        }

        .content{
            text-align:center;
            font-size:22px;
            line-height:40px;
        }

        .card{
            display:grid;
            grid-template-columns:repeat(2,500px);
            justify-content:center;
            position:relative;
        }

        .card1 .img1,.img2,.img3{
            width:150px;
            margin-top:50px;
            padding:40px;
            animation:zoom 4s infinite alternate;
        }

        .card1 .img2,.img3{
            display:none;
        }

        .mc .img4{
            width:200px;
            display:none;
            margin:auto;
            margin-top:100px;
            animation:zoom 2s infinite alternate;
        }

        @keyframes zoom{

            0%{
                transform:scale(1);
            }

            100%{
                transform:scale(1.2);
            }

        }

        @media(max-width:700px){

            .card{
                grid-template-columns:350px;
            }

            .card1 img{
                width:150px;
                margin-left:60px;
            }

            .title{
                font-size:35px;
            }

            .content{
                font-size:18px;
            }

        }

    </style>

</head>

<body>

<h1 class="title">🎈 Balloon Surprise Gift 🎈</h1>

<p class="content">
    Click all the balloons and discover the hidden surprise gift.<br>

    Every balloon contains a magical animation.<br>

    Complete all balloons to unlock the final reward.
</p>
<p> Developed by shakeera, savishna, thulasi, pavithra</p>
<div class="mc">
    <img src="pic4.png" class="img4">
</div>

<div class="card">

    <div class="card1">
        <img src="pic1.png" class="img1">
        <img src="pic2.png" class="img2">
        <img src="pic3.png" class="img3">
    </div>

    <div class="card1">
        <img src="pic1.png" class="img1">
        <img src="pic5.png" class="img2">
        <img src="pic8.png" class="img3">
    </div>

    <div class="card1">
        <img src="pic1.png" class="img1">
        <img src="pic6.png" class="img2">
        <img src="pic9.png" class="img3">
    </div>

    <div class="card1">
        <img src="pic1.png" class="img1">
        <img src="pic7.png" class="img2">
        <img src="piv10.png" class="img3">
    </div>

</div>

<script>

const cards = document.querySelectorAll(".card1");

let count = 0;

cards.forEach((card)=>{

    const img1 = card.querySelector(".img1");

    const img2 = card.querySelector(".img2");

    const img3 = card.querySelector(".img3");

    card.addEventListener("click",()=>{

        img1.style.display = "none";

        img2.style.display = "block";

        setTimeout(()=>{

            img2.style.transform = "translateX(200px)";

            img2.style.transition = "1s";

            img2.style.display = "none";

            img3.style.display = "block";

        },1000);

        count++;

        if(count >= cards.length){

            setTimeout(()=>{

                document.querySelector(".card").style.display = "none";

                document.querySelector(".img4").style.display = "block";

            },2000);

        }

    });

});

</script>

</body>
</html>
